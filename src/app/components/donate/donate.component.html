<div class="d-flex flex-column w-100 min-vh-100 align-items-center">
  <div class="page-header d-flex w-100 flex-column">
    <div class="h-100 w-100 d-flex p-4">
      <div class="h-100 d-flex align-items-center">
        <img class="page-logo-image" src="assets/images/logo-white-small.png" />
      </div>
      <div class="spacer"></div>
      <app-menu [isDonateSelected]="true"></app-menu>
    </div>
  </div>
  <div class="page-content">
    <h1 class="align-self-center">{{ config.title }}</h1>
    <p class="mt-5">
      {{ config.description }}
    </p>
    <p>
      <a href="https://www.paypal.com/donate/?hosted_button_id=N9Z4D62P24KRU"
        >Paypal</a
      >
      or <a href="https://ko-fi.com/S6S11K63U">Ko-fi</a>.
    </p>
    <p>Thank you ❤️</p>
  </div>
  <div class="spacer"></div>
  <app-footer class="w-100"></app-footer>
</div>
